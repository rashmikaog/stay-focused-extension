<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stay Focused</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Stack+Sans+Headline:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=mindfulness"
    />

    <style>
      body {
        font-family:
          "Stack Sans Headline",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif !important;
      }
      button,
      input {
        font-family: inherit;
      }

      header {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-bottom: 12px;
        border-bottom: none;
        padding-bottom: 0;
      }

      header .material-symbols-outlined {
        font-size: 48px;
        margin-bottom: 8px;
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }

      header h1 {
        font-size: 14px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        text-align: center;
        color: #ffffff;
        margin: 0;
        border-bottom: none;
        text-decoration: none;
      }
    </style>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <span class="material-symbols-outlined">mindfulness</span>
        <h1>Stay Focused</h1>
      </header>

      <section id="timerSection" class="card">
        <div id="idleView">
          <label for="durationInput">Session length (minutes)</label>
          <input
            type="number"
            id="durationInput"
            min="1"
            max="180"
            value="25"
          />
          <button id="startBtn" class="primary-btn">Start Focus Session</button>
          <button id="testStartBtn" class="test-btn">
            Start 1-min test session
          </button>
        </div>

        <div id="activeView" class="hidden">
          <p class="status-label">Focus session active</p>

          <div class="flip-timer">
            <div class="timer-box">
              <div id="minutesBox" class="timer-digits">25</div>
              <div class="timer-label">MINUTES</div>
            </div>
            <div class="timer-box">
              <div id="secondsBox" class="timer-digits">00</div>
              <div class="timer-label">SECONDS</div>
            </div>
          </div>

          <div id="countdown" class="hidden" aria-live="polite">25:00</div>

          <button id="stopBtn" class="secondary-btn">End Session</button>
        </div>
      </section>

      <section class="card">
        <h2>Blocked Sites</h2>
        <div class="add-row">
          <input type="text" id="siteInput" placeholder="e.g. youtube.com" />
          <button id="addBtn">Add</button>
        </div>
        <p id="siteError" class="error-msg hidden"></p>
        <ul id="siteList"></ul>
      </section>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
