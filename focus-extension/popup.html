<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stay Focused</title>

    <!-- Google Fonts Links -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Stack+Sans+Headline:wght@200..700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family:
          "Stack Sans Headline",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif !important;
      }
      button,
      input {
        font-family: inherit;
      }
    </style>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🎯 Stay Focused</h1>
      </header>

      <section id="timerSection" class="card">
        <!-- Idle Setup Interface -->
        <div id="idleView">
          <label for="durationInput">Session length (minutes)</label>
          <input
            type="number"
            id="durationInput"
            min="1"
            max="180"
            value="25"
          />
          <button id="startBtn" class="primary-btn">Start Focus Session</button>
          <button id="testStartBtn" class="test-btn">
            Start 1-min test session
          </button>
        </div>

        <!-- Active View Styled after image_80170b.png -->
        <div id="activeView" class="hidden">
          <p class="status-label">Focus session active</p>

          <!-- Streetwear Split Timer Block -->
          <div class="flip-timer">
            <div class="timer-box">
              <div id="minutesBox" class="timer-digits">25</div>
              <div class="timer-label">MINUTES</div>
            </div>
            <div class="timer-box">
              <div id="secondsBox" class="timer-digits">00</div>
              <div class="timer-label">SECONDS</div>
            </div>
          </div>

          <!-- Kept hidden/accessible for your background messaging target scripts -->
          <div id="countdown" class="hidden" aria-live="polite">25:00</div>

          <button id="stopBtn" class="secondary-btn">End Session</button>
        </div>
      </section>

      <section class="card">
        <h2>Blocked Sites</h2>
        <div class="add-row">
          <input type="text" id="siteInput" placeholder="e.g. youtube.com" />
          <button id="addBtn">Add</button>
        </div>
        <p id="siteError" class="error-msg hidden"></p>
        <ul id="siteList"></ul>
      </section>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
