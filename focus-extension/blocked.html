<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stay Focused</title>

    <!-- Fonts & Icons Links -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Stack+Sans+Headline:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=mindfulness"
    />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          "Stack Sans Headline",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background-color: #000000;
        color: #e5e5e7;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        overflow: hidden;
      }

      .box {
        max-width: 420px;
        padding: 40px;
        background: #0a0a0c;
        border-radius: 12px;
        border: 1px solid #1c1c1e;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        transition: border-color 0.3s ease;
      }

      .box:hover {
        border-color: #2c2c2e;
      }

      .icon-container {
        margin-bottom: 24px;
      }

      .material-symbols-outlined {
        font-size: 64px;
        color: #ffffff;
        font-variation-settings:
          "FILL" 0,
          "wght" 300,
          "GRAD" 0,
          "opsz" 24;
        filter: drop-shadow(0 0 16px rgba(255, 255, 255, 0.15));
      }

      h1 {
        font-size: 26px;
        font-weight: 600;
        letter-spacing: -0.5px;
        margin-bottom: 12px;
        color: #ffffff;
      }

      p {
        color: #8e8e93;
        font-size: 15px;
        margin-bottom: 32px;
        line-height: 1.6;
      }

      #countdown {
        font-size: 38px;
        font-weight: 700;
        color: #ff3b30;
        margin-bottom: 32px;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.5px;
      }

      button {
        font-family: inherit;
        padding: 12px 28px;
        border: 1px solid #2c2c2e;
        border-radius: 6px;
        background: #1c1c1e;
        color: #ffffff;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition:
          background 0.2s,
          border-color 0.2s;
      }

      button:hover {
        background: #2c2c2e;
        border-color: #48484a;
      }

      button:active {
        background: #1c1c1e;
      }

      .site {
        color: #ffffff;
        font-weight: 600;
        word-break: break-all;
        text-decoration: underline;
        text-decoration-color: #3a3a3c;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="icon-container">
        <span class="material-symbols-outlined">mindfulness</span>
      </div>
      <h1>Stay focused</h1>
      <p>
        <span id="siteName" class="site">This site</span> is blocked during your
        focus session.
      </p>
      <div id="countdown">--:--</div>
      <button id="backBtn">Go Back</button>
    </div>

    <script>
      const params = new URLSearchParams(location.search);
      const rawSite = params.get("site");
      if (rawSite) {
        try {
          const cleanSite = rawSite.replace(/^(https?:\/\/)?(www\.)?/, "");
          document.getElementById("siteName").textContent = cleanSite;
        } catch (e) {
          document.getElementById("siteName").textContent = rawSite;
        }
      }

      document.getElementById("backBtn").addEventListener("click", () => {
        if (history.length > 1) {
          history.back();
        } else {
          try {
            window.close();
          } catch (e) {
            location.href = "about:blank";
          }
        }
      });

      function tick() {
        try {
          chrome.runtime.sendMessage({ type: "GET_STATE" }, (state) => {
            if (chrome.runtime.lastError) {
              document.getElementById("countdown").textContent = "—";
              return;
            }

            if (!state || !state.sessionActive || !state.sessionEndTime) {
              handleSessionEnd();
              return;
            }

            const remaining = state.sessionEndTime - Date.now();

            if (remaining <= 0) {
              handleSessionEnd();
              return;
            }

            const totalSec = Math.floor(remaining / 1000);
            const m = Math.floor(totalSec / 60);
            const s = totalSec % 60;
            document.getElementById("countdown").textContent =
              `${m}:${s.toString().padStart(2, "0")} remaining`;
          });
        } catch (e) {
          document.getElementById("countdown").textContent = "—";
        }
      }

      function handleSessionEnd() {
        document.getElementById("countdown").textContent = "Session ended!";
        document.getElementById("countdown").style.color = "#34c759";
        const targetUrl = params.get("url") || params.get("site");
        if (targetUrl) {
          setTimeout(() => {
            location.href = targetUrl.startsWith("http")
              ? targetUrl
              : `https://${targetUrl}`;
          }, 1000);
        }
      }

      tick();
      setInterval(tick, 1000);
    </script>
  </body>
</html>
